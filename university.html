<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>University Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-light bg-light px-4 shadow-sm">
    <a class="navbar-brand fw-bold" href="index.html">UniClubs</a>
    <div>
        <a href="login.html" class="btn btn-outline-dark me-2">Login</a>
        <a href="register.html" class="btn btn-dark">Register</a>
    </div>
</nav>

<div class="container py-5">

    <!-- Back Button -->
    <button onclick="history.back()" class="btn btn-outline-dark mb-4">
        ← Back
    </button>

    <!-- UNIVERSITY INFO CARD -->
    <div class="card p-4 shadow-sm mb-5 border-0">
        <div class="row align-items-center">

            <!-- LEFT SIDE -->
            <div class="col-md-8">
                <h1 id="universityTitle" class="fw-bold mb-3"></h1>
                <p id="universityDescription" class="text-muted mb-4"></p>

                <div class="d-flex gap-5">
                    <div>
                        <h4 id="studentCount" class="fw-bold mb-0"></h4>
                        <small class="text-muted">Students</small>
                    </div>

                    <div>
                        <h4 id="clubCount" class="fw-bold mb-0"></h4>
                        <small class="text-muted">Clubs</small>
                    </div>
                </div>
            </div>

            <!-- RIGHT SIDE -->
            <div class="col-md-4 text-center">
                <img id="universityImage"
                     src=""
                     alt="University Image"
                     class="img-fluid rounded"
                     style="max-height:200px; object-fit:contain;">
            </div>

        </div>
    </div>

    <!-- CLUBS SECTION -->
    <div class="mt-4">

        <!-- Başlık + Filtreler -->
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">

            <div>
                <h3 class="fw-bold mb-0">Clubs</h3>
                <small id="clubFoundCount" class="text-muted"></small>
            </div>

            <div class="d-flex gap-2">

                <input type="text"
                       id="clubSearch"
                       class="form-control"
                       placeholder="Search clubs..."
                       style="width:220px;">

                <select id="categoryFilter"
                        class="form-select"
                        style="width:200px;">
                    <option value="all">All Categories</option>
                    <option value="Technology">Technology</option>
                    <option value="Business">Business</option>
                    <option value="Engineering">Engineering</option>
                    <option value="Arts">Arts</option>
                    <option value="Health">Health</option>
                    <option value="Social">Social</option>
                </select>

            </div>

        </div>

        <!-- Club Cards -->
        <div class="row g-4" id="clubList"></div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Data + Script -->
<script src="js/data.js"></script>
<script src="js/university.js"></script>

</body>
</html>
