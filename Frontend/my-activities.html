<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Aktivitelerim - UniClubs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-light bg-light px-4 shadow-sm">
    <a class="navbar-brand fw-bold" href="index.html">UniClubs</a>
    <div>
        <a href="profile.html" class="btn btn-outline-dark me-2">Profilim</a>
        <button class="btn btn-dark" onclick="logout()">Çıkış Yap</button>
    </div>
</nav>

<div class="container py-5">

    <h3 class="fw-bold mb-4">Aktivitelerim</h3>

    <!-- SEKMELER -->
    <ul class="nav nav-tabs mb-4">
        <li class="nav-item">
            <button class="nav-link active" data-tab="clubs">Kulüplerim</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-tab="events">Etkinliklerim</button>
        </li>
    </ul>

    <!-- KULÜPLER SEKMESİ -->
    <div id="tab-clubs">
        <div id="clubsContainer">
            <p class="text-muted">Yükleniyor...</p>
        </div>
    </div>

    <!-- ETKİNLİKLER SEKMESİ -->
    <div id="tab-events" class="d-none">
        <div id="eventsContainer">
            <p class="text-muted">Yükleniyor...</p>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/services/apiService.js"></script>
<script src="js/auth.js"></script>

</html>
