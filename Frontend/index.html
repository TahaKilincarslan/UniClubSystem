<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UniClubs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-light bg-light px-4">
    <a class="navbar-brand fw-bold" href="#"> UniClubs</a>

    <div>
        <a href="login.html" class="btn btn-outline-dark me-2">Login</a>
        <a href="register.html" class="btn btn-dark">Register</a >
    </div>
 </nav>

<!-- HERO SECTION -->
<section class="text-center py-5">
    <div class="container">
        <h1 class="fw-bold">Join University Clubs</h1>
        <p class="text-muted">
            Discover and connect with student organizations at universities across the country
        </p>

        <div class="row justify-content-center mt-4 g-2">
            <div class="col-md-3">
                <select id="cityFilter" class="form-select rounded-pill shadow-sm">
                    <option value="all">All Cities</option>
                    <option value="Istanbul">Istanbul</option>
                    <option value="Ankara">Ankara</option>
                    <option value="Izmir">Izmir</option>
                </select>
            </div>
            <div class="col-md-4">
                <input type="text" id="searchInput" class="form-control shadow-sm rounded-pill" placeholder="Search universities...">
            </div>
        </div>
    </div>
</section>

<!-- UNIVERSITIES SECTION -->
<section class="py-5 bg-light">
    <div class="container">
        <h2 class="mb-4">Universities</h2>

        <div class="row g-4" id="universityList">

            

            <p id="noResultMessage" class="text-center text-danger mt-4 d-none">
                No universities found.
            </p>

        </div>
    </div>
</section>

<!-- STATS SECTION -->
<section class="py-5 text-center">
    <div class="container">
        <div class="row">

            <div class="col-md-4">
                <h2 id="totalUniversities" class="fw-bold">0</h2>
                <p class="text-muted">Total Universities</p>
            </div>

            <div class="col-md-4">
                <h2 id="totalClubs" class="fw-bold">0</h2>
                <p class="text-muted">Total Clubs</p>
            </div>

            <div class="col-md-4">
                <h2 id="totalMembers" class="fw-bold">0</h2>
                <p class="text-muted">Active Members</p>
            </div>

        </div>
    </div>
</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/services/apiService.js"></script>
<script src="js/main.js"></script>

</body>
</html>
