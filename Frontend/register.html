<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="card shadow p-4" style="width:400px">

<h3 class="text-center mb-4">Create Account</h3>

<form id="registerForm">

<input class="form-control mb-3" id="firstName" placeholder="First Name">

<input class="form-control mb-3" id="lastName" placeholder="Last Name">

<input class="form-control mb-3" id="email" placeholder="Email">

<input class="form-control mb-3" type="password" id="password" placeholder="Password">

<button class="btn btn-dark w-100">
Register
</button>

</form>

<p class="text-center mt-3">
Already have account?
<a href="login.html">Login</a>
</p>

</div>
</div>

<script src="js/register.js"></script>

</body>
</html>
