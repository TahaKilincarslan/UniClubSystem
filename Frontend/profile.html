<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Profilim - UniClubs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-light bg-light px-4 shadow-sm">
    <a class="navbar-brand fw-bold" href="index.html">UniClubs</a>
    <div>
        <a href="index.html" class="btn btn-outline-dark me-2">Ana Sayfa</a>
        <button class="btn btn-dark" onclick="logout()">Çıkış Yap</button>
    </div>
</nav>

<div class="container py-5" style="max-width: 700px;">

    <!-- BAŞLIK -->
    <div class="text-center mb-4">
        <div class="bg-dark text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
             style="width:80px; height:80px; font-size:2rem;">
            <span id="avatarInitials">?</span>
        </div>
        <h3 id="profileFullName" class="fw-bold mb-0">Yükleniyor...</h3>
        <span id="profileRole" class="badge bg-secondary mt-1"></span>
    </div>

    <!-- BİLGİ GÜNCELLEME KARTI -->
    <div class="card shadow-sm mb-4">
        <div class="card-header fw-bold">Kişisel Bilgiler</div>
        <div class="card-body">
            <form id="profileForm">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Ad</label>
                        <input type="text" id="firstName" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Soyad</label>
                        <input type="text" id="lastName" class="form-control">
                    </div>
                    <div class="col-12">
                        <label class="form-label">E-posta</label>
                        <input type="email" id="email" class="form-control">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Üniversite</label>
                        <select id="universityId" class="form-select">
                            <option value="0">Seçiniz...</option>
                        </select>
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Bölüm</label>
                        <select id="department" class="form-select">
                            <option value="">Seçiniz...</option>
                            <option>Bilgisayar Mühendisliği</option>
                            <option>Yazılım Mühendisliği</option>
                            <option>Elektrik-Elektronik Mühendisliği</option>
                            <option>Makine Mühendisliği</option>
                            <option>İnşaat Mühendisliği</option>
                            <option>Endüstri Mühendisliği</option>
                            <option>Kimya Mühendisliği</option>
                            <option>Biyomedikal Mühendisliği</option>
                            <option>Matematik</option>
                            <option>Fizik</option>
                            <option>Kimya</option>
                            <option>İşletme</option>
                            <option>İktisat</option>
                            <option>Hukuk</option>
                            <option>Tıp</option>
                            <option>Hemşirelik</option>
                            <option>Psikoloji</option>
                            <option>Sosyoloji</option>
                            <option>Mimarlık</option>
                            <option>İç Mimarlık</option>
                            <option>Güzel Sanatlar</option>
                            <option>Müzik</option>
                            <option>Eğitim</option>
                            <option>Türk Dili ve Edebiyatı</option>
                            <option>Tarih</option>
                            <option>Felsefe</option>
                            <option>Uluslararası İlişkiler</option>
                            <option>Siyaset Bilimi</option>
                            <option>İletişim</option>
                            <option>Gastronomi</option>
                            <option>Turizm</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Sınıf</label>
                        <select id="year" class="form-select">
                            <option value="">Seçiniz...</option>
                            <option value="0">Hazırlık</option>
                            <option value="1">1. Sınıf</option>
                            <option value="2">2. Sınıf</option>
                            <option value="3">3. Sınıf</option>
                            <option value="4">4. Sınıf</option>
                            <option value="5">5. Sınıf</option>
                        </select>
                    </div>
                </div>
                <div class="mt-3 text-end">
                    <button type="submit" class="btn btn-dark">Bilgileri Kaydet</button>
                </div>
            </form>
            <div id="profileMessage" class="mt-2"></div>
        </div>
    </div>

    <!-- ŞİFRE DEĞİŞTİRME KARTI -->
    <div class="card shadow-sm">
        <div class="card-header fw-bold">Şifre Değiştir</div>
        <div class="card-body">
            <form id="passwordForm">
                <div class="mb-3">
                    <label class="form-label">Mevcut Şifre</label>
                    <input type="password" id="currentPassword" class="form-control" placeholder="Mevcut şifrenizi girin">
                </div>
                <div class="mb-3">
                    <label class="form-label">Yeni Şifre</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="Yeni şifrenizi girin">
                </div>
                <div class="mb-3">
                    <label class="form-label">Yeni Şifre (Tekrar)</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Yeni şifrenizi tekrar girin">
                </div>
                <div class="text-end">
                    <button type="submit" class="btn btn-dark">Şifreyi Güncelle</button>
                </div>
            </form>
            <div id="passwordMessage" class="mt-2"></div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/services/apiService.js"></script>
<script src="js/auth.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
