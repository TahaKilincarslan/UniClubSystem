<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Club Details - UniClubs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .club-header {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('images/clubs/default.jpg');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 100px 0;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .event-card {
            transition: transform 0.2s;
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .event-card:hover {
            transform: translateY(-5px);
        }

        .status-badge {
            font-size: 0.8rem;
            padding: 5px 10px;
            border-radius: 20px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-light bg-light px-4 shadow-sm">
        <a class="navbar-brand fw-bold" href="index.html">UniClubs</a>
        <div id="navButtons">
            <!-- Dynamic content -->
        </div>
    </nav>

    <div class="container py-5">
        <!-- Back Button -->
        <button onclick="history.back()" class="btn btn-outline-dark mb-4">
            ← Back
        </button>

        <!-- CLUB HEADER -->
        <div id="clubHeader" class="club-header text-center">
            <h1 id="clubName" class="display-4 fw-bold">Loading...</h1>
            <p id="clubCategory" class="lead"></p>
        </div>

        <div class="row">
            <!-- CLUB INFO -->
            <div class="col-md-4 mb-4">
                <div class="card border-0 shadow-sm p-4 h-100">
                    <h3 class="fw-bold mb-3">About Club</h3>
                    <p id="clubDescription" class="text-muted"></p>
                    <hr>
                    <div class="mb-3">
                        <strong>Manager:</strong> <span id="clubManager">Loading...</span>
                    </div>
                    <div id="membershipContainer" class="mt-3"></div>
                </div>
            </div>

            <!-- EVENTS SECTION -->
            <div class="col-md-8">

                <!-- ETKİNLİK EKLE (sadece admin görür) -->
                <div id="addEventSection" class="d-none mb-4">
                    <div class="card shadow-sm">
                        <div class="card-header bg-success text-white">Yeni Etkinlik Ekle</div>
                        <div class="card-body">
                            <form id="addEventForm" class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Etkinlik Adı</label>
                                    <input type="text" id="newEventTitle" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Konum</label>
                                    <input type="text" id="newEventLocation" class="form-control" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Tarih & Saat</label>
                                    <input type="datetime-local" id="newEventDate" class="form-control" required>
                                </div>
                                <div class="col-md-8">
                                    <label class="form-label">Açıklama</label>
                                    <input type="text" id="newEventDescription" class="form-control">
                                </div>
                                <div class="col-12 text-end">
                                    <button type="submit" class="btn btn-success">Ekle</button>
                                </div>
                            </form>
                            <div id="addEventMessage" class="mt-2"></div>
                        </div>
                    </div>
                </div>

                <h3 class="fw-bold mb-4">Etkinlikler</h3>
                <div id="eventList" class="row g-4">
                    <!-- Events will be loaded here -->
                </div>
                <div id="noEvents" class="text-center py-5 d-none">
                    <p class="text-muted">No upcoming events for this club.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Scripts -->
    <script src="js/services/apiService.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/club.js"></script>

</body>

</html>
